name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    env:
      VULKAN_SDK_VERSION: 1.4.328.1
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $sdkRoot = Join-Path $env:RUNNER_TEMP "VulkanSDK"
          $installer = Join-Path $env:RUNNER_TEMP "vulkan-sdk.exe"
          $downloadUrl = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/vulkan_sdk.exe"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $installer
          & $installer --root $sdkRoot --accept-licenses --default-answer --confirm-command install copy_only=1
          if ($LASTEXITCODE -ne 0) {
            throw "Vulkan SDK installer failed with exit code $LASTEXITCODE"
          }
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VK_LAYER_PATH=$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Configure, build, and test
        run: cmake --workflow --preset ci-windows

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and SDL prerequisites
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang clang-tidy ninja-build
          libasound2-dev libdbus-1-dev libdecor-0-dev libpulse-dev libudev-dev
          libvulkan-dev mesa-vulkan-drivers vulkan-validationlayers
          libwayland-dev libx11-dev libxcursor-dev libxext-dev libxfixes-dev libxi-dev
          libxkbcommon-dev libxrandr-dev
          libxss-dev libxtst-dev
      - name: Configure, build, and test
        run: cmake --workflow --preset ci-linux
